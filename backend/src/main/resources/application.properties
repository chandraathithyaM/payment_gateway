# ===================================
# SERVER CONFIGURATION
# ===================================
server.port=8080

# ===================================
# DATABASE CONFIGURATION (MySQL)
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/payment_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================
# RAZORPAY CONFIGURATION
# ===================================
# >> PASTE YOUR RAZORPAY KEYS HERE <<
razorpay.key.id=YOUR_RAZORPAY_KEY_ID
razorpay.key.secret=YOUR_RAZORPAY_KEY_SECRET

# ===================================
# LOGGING
# ===================================
logging.level.com.payment=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===================================
# APPLICATION NAME
# ===================================
spring.application.name=payment-backend
